<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Student ID Card</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="id-card">
    <div class="card-header">
      <img src="./assert/download.png" height="70px" weight="100px" alt="School Logo" class="logo">
      <h2>AU IGNITE ACADEMY</h2>
      </div>
      
    <div class="photo-section">
      <img src="./assert/kanishk.jpg" height="100px" alt="hellophoto">
    </div>

    <div class="student-info">                             
      <h3>KANISHK SHARMA </h3>
      <p><strong>Class:</strong> Mern Stack Developer</p>
      <p><strong>Unique ID:</strong> 101340910</p>
      <p><strong>DOB:</strong> 15 Sep 2025</p>
    </div>

    <div class="footer">
      <div class="qr">
        <img src="./assert/images (1).png" height="100px"  alt="QR Code">
      </div>
      <b> <p>Valid Till: November 2025</p> </b>
    </div>
  </div>
</body>
</html>
