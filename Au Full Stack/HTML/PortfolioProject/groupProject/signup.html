<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Dynamic Sign Up Page</title>
    <style>
        /* Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Poppins", sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #6a11cb, #2575fc);
        }

        .container {
            width: 380px;
            padding: 30px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            animation: fadeIn 1s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #fff;
            font-size: 26px;
        }

        .form-group {
            margin-bottom: 15px;
            position: relative;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: none;
            border-radius: 12px;
            outline: none;
            background: rgba(255, 255, 255, 0.8);
            font-size: 15px;
            transition: 0.3s;
        }

        input:focus {
            background: #fff;
            box-shadow: 0 0 8px rgba(37, 117, 252, 0.6);
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            color: #fff;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: linear-gradient(135deg, #2575fc, #6a11cb);
            transform: translateY(-2px);
        }

        .message {
            text-align: center;
            margin-top: 12px;
            font-size: 14px;
        }

        .error {
            color: #ff4d4d;
        }

        .success {
            color: #28a745;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>Create Account</h2>
        <form id="signupForm">
            <div class="form-group">
                <input type="text" id="username" placeholder="Full Name" required>
            </div>
            <div class="form-group">
                <input type="email" id="email" placeholder="Email Address" required>
            </div>
            <div class="form-group">
                <input type="password" id="password" placeholder="Password" required>
            </div>
            <div class="form-group">
                <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
            </div>
            <div class="form-group">
                <input type="text" id="phone" placeholder="Phone Number" required>
            </div>
            <button type="submit">Sign Up</button>
            <div class="message" id="message"></div>
        </form>
    </div>

    <script>
        document.getElementById("signupForm").addEventListener("submit", function (e) {
            e.preventDefault();

            const username = document.getElementById("username").value.trim();
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value;
            const confirmPassword = document.getElementById("confirmPassword").value;
            const phone = document.getElementById("phone").value.trim();
            const message = document.getElementById("message");

            // Validation
            if (username.length < 3) {
                message.textContent = "Name must be at least 3 characters!";
                message.className = "message error";
                return;
            }

            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                message.textContent = "Invalid email format!";
                message.className = "message error";
                return;
            }

            if (password.length < 6) {
                message.textContent = "Password must be at least 6 characters!";
                message.className = "message error";
                return;
            }

            if (password !== confirmPassword) {
                message.textContent = "Passwords do not match!";
                message.className = "message error";
                return;
            }

            if (!/^[0-9]{10}$/.test(phone)) {
                message.textContent = "Phone number must be 10 digits!";
                message.className = "message error";
                return;
            }

            // Success
            message.textContent = "✅ Account created successfully!";
            message.className = "message success";

            // Example: Send data to backend (fake simulation here)
            console.log({
                username,
                email,
                password,
                phone
            });
        });
    </script>
</body>

</html>
